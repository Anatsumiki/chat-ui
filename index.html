<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat · 对话平台</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app" id="app">
      <!-- ============================================================
       Top Navbar
       ============================================================ -->
      <nav class="navbar">
        <div class="logo">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12 2a10 10 0 0 1 10 10c0 5-4 8-10 8S2 17 2 12 7 2 12 2z"
            />
            <path d="M8 12h8" />
            <path d="M12 8v8" />
          </svg>
          AI Chat
        </div>
        <div class="spacer"></div>

        <button class="nav-btn" id="apiSettingsBtn" title="API 配置">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
            />
          </svg>
          API 配置
        </button>

        <button class="nav-btn" id="clearChatBtn" title="清空对话">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6" />
            <path
              d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            />
          </svg>
        </button>
      </nav>

      <!-- ============================================================
       Body (Sidebar + Main)
       ============================================================ -->
      <div class="body">
        <!-- ── Sidebar ────────────────────────────────────────────── -->
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-inner">
            <div class="sidebar-head">
              <button class="new-chat-btn" id="newChatBtn">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                >
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                新对话
              </button>
              <button class="collapse-btn" id="collapseSidebarBtn">
                &lsaquo;
              </button>
            </div>

            <div class="sidebar-search">
              <input
                type="text"
                id="convSearch"
                placeholder="搜索对话记录..."
                autocomplete="off"
              />
            </div>

            <div class="conv-list" id="convList"></div>

            <div class="sidebar-footer">
              <div class="user-avatar">U</div>
              <span class="user-name">未命名用户</span>
            </div>
          </div>
        </aside>

        <!-- Sidebar toggle (visible when collapsed) -->
        <button class="sidebar-toggle-fab" id="sidebarToggleFab">
          &rsaquo;
        </button>

        <!-- ── Main Chat Area ─────────────────────────────────────── -->
        <main class="main" id="mainArea">
          <div class="chat-header">
            <span class="conv-title-display" id="convTitleDisplay">新对话</span>
            <span class="spacer"></span>
            <span class="model-badge" id="modelBadge">未配置</span>
          </div>

          <div class="messages" id="messagesContainer">
            <!-- Empty state placeholder -->
            <div class="empty-state" id="emptyState">
              <div class="icon">&#10024;</div>
              <h2>开始一段新对话</h2>
              <p>
                在下方输入你的消息，AI 将为你提供帮助。<br />
                请先在右上角 <strong>API 配置</strong> 中填写你的 API
                端点与密钥。
              </p>
            </div>

            <!-- Message list -->
            <div
              class="messages-inner"
              id="messagesInner"
              style="display: none"
            ></div>
          </div>

          <!-- Input Area -->
          <div class="input-area">
            <div class="input-area-inner">
              <textarea
                id="chatInput"
                rows="1"
                placeholder="输入消息…"
                maxlength="10000"
              ></textarea>
              <button class="send-btn" id="sendBtn" title="发送">&uarr;</button>
            </div>
            <div class="input-tools">
              <span id="apiStatus" class="status-disconnected">
                &#9679; API 未配置
              </span>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- ================================================================
     API Settings Modal
     ================================================================ -->
    <div class="modal-overlay" id="apiModal">
      <div class="modal">
        <div class="modal-head">
          <h3>API 配置</h3>
          <button class="modal-close" id="apiModalClose">&times;</button>
        </div>

        <div class="modal-body">
          <div class="form-group">
            <label for="apiEndpoint">API 端点 URL</label>
            <input
              type="url"
              id="apiEndpoint"
              placeholder="https://api.openai.com/v1/chat/completions"
              autocomplete="off"
            />
            <span class="form-hint">支持任意兼容 OpenAI API 格式的端点</span>
          </div>
          <div class="form-group">
            <label for="apiKey">API 密钥</label>
            <input type="password" id="apiKey" placeholder="sk-" />
            <span class="form-hint">不填将无法使用</span>
          </div>
          <div class="form-group">
            <label for="modelSelect">模型</label>
            <input
              type="text"
              id="modelSelect"
              placeholder="gpt-4o / deepseek-chat / ..."
              autocomplete="off"
            />
            <span class="form-hint">填写你的模型名称</span>
          </div>

          <div class="form-group">
            <label for="systemPrompt">系统提示词（可选）</label>
            <input
              type="text"
              id="systemPrompt"
              placeholder="你是一个有帮助的 AI 助手。"
              autocomplete="off"
            />
          </div>

          <div class="form-group">
            <label for="maxTokens">最大 Token 数</label>
            <input
              type="number"
              id="maxTokens"
              value="2048"
              min="64"
              max="16384"
              step="64"
            />
          </div>

          <div class="form-group">
            <label for="temperature">温度 (Temperature)</label>
            <input
              type="number"
              id="temperature"
              value="0.7"
              min="0"
              max="2"
              step="0.1"
            />
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn-cancel" id="apiModalCancel">取消</button>
          <button class="btn-save" id="apiModalSave">保存配置</button>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="index.js"></script>
  </body>
</html>
